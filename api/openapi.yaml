openapi: 3.0.3
info:
  title: JobTracker API
  description: Self-hosted job application tracker with AI assistance
  version: 0.1.0

servers:
  - url: http://localhost:8080/api/v1

paths:
  /applications:
    get:
      operationId: listApplications
      summary: List applications, optionally filtered by status
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApplicationStatus"
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"
    post:
      operationId: createApplication
      summary: Create a new application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          $ref: "#/components/responses/BadRequest"

  /applications/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: getApplication
      summary: Get a single application
      responses:
        "200":
          description: Application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateApplication
      summary: Partially update an application (e.g. status change)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteApplication
      summary: Delete an application
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /ai/parse-job:
    post:
      operationId: parseJobPosting
      summary: Parse a raw job posting text into a structured application draft
      description: >
        Sends the raw posting text to the LLM and returns a draft Application.
        Nothing is persisted; the client reviews the draft and calls
        POST /applications to save it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [raw_text]
              properties:
                raw_text:
                  type: string
                  description: Full text of the job posting (copy-pasted)
                url:
                  type: string
                  description: Optional source URL
      responses:
        "200":
          description: Parsed draft (not persisted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationInput"
        "422":
          description: Text could not be parsed as a job posting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    ApplicationStatus:
      type: string
      enum: [saved, applied, interview, offer, rejected, ghosted]

    SalaryPeriod:
      type: string
      enum: [hourly, monthly, yearly]

    EmploymentType:
      type: string
      enum: [werkstudent, fulltime, parttime, internship]

    ApplicationInput:
      type: object
      required: [company, position]
      properties:
        company:
          type: string
        position:
          type: string
        city:
          type: string
        source:
          type: string
          enum: [linkedin, indeed, stepstone, referral, company_site, other]
        url:
          type: string
        employment_type:
          $ref: "#/components/schemas/EmploymentType"
        salary_min:
          type: number
          format: double
          nullable: true
        salary_max:
          type: number
          format: double
          nullable: true
        salary_period:
          $ref: "#/components/schemas/SalaryPeriod"
        status:
          $ref: "#/components/schemas/ApplicationStatus"
        applied_at:
          type: string
          format: date
          nullable: true
        notes:
          type: string
        job_description:
          type: string
          description: Raw posting text, reused later for CV scoring and cover letters

    ApplicationUpdate:
      type: object
      description: All fields optional; only provided fields are updated
      properties:
        company:
          type: string
        position:
          type: string
        city:
          type: string
        source:
          type: string
          enum: [linkedin, indeed, stepstone, referral, company_site, other]
        url:
          type: string
        employment_type:
          $ref: "#/components/schemas/EmploymentType"
        salary_min:
          type: number
          format: double
          nullable: true
        salary_max:
          type: number
          format: double
          nullable: true
        salary_period:
          $ref: "#/components/schemas/SalaryPeriod"
        status:
          $ref: "#/components/schemas/ApplicationStatus"
        applied_at:
          type: string
          format: date
          nullable: true
        notes:
          type: string
        job_description:
          type: string

    Application:
      allOf:
        - $ref: "#/components/schemas/ApplicationInput"
        - type: object
          required: [id, created_at, updated_at]
          properties:
            id:
              type: integer
              format: int64
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string

  responses:
    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
